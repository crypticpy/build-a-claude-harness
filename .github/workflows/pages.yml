name: deploy-pages

# Builds the Harness Atlas site (site/) and deploys it to GitHub Pages.
# Source must be set to "GitHub Actions" in repo Settings > Pages.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Build (provenance gate + astro build)
        run: npm run build
        env:
          PIN_SHA: ${{ github.sha }}
      - name: Guardrails
        run: npm run guardrails
      - name: Budgets
        run: npm run budgets
      - name: Links
        run: npm run links
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
